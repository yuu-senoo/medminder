name: Medication Reminder

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Call remind API
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/remind"
